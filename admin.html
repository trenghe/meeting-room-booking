<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRE NGHỆ | Trang Quản Trị Lịch Đặt Phòng Họp - Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="anh/Logo_TN2.png" />
    <!-- Tải các CSS cần thiết -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/modal.css" />
  </head>
  <body>
    <div class="container">
      <header class="header admin-header">
        <img
          src="anh/Logo_TN1.png"
          alt="Tre Nghệ Logo"
          class="logo"
        />
        <h1> Trang Quản Trị Lịch Họp</h1>
        
      </header>

      <section id="adminView">
        <div class="admin-container">
          <div class="admin-topbar">
            <a href="index.html" id="backToMainLink" class="back-link">&larr; Quay lại trang chính</a>
          </div>

          <h2>Danh Sách Lịch Đặt Phòng</h2>

          <div class="table-responsive">
            <table class="admin-table">
              <thead>
        <tr>
            <th style="width:60px">STT</th>
            <th>Ngày</th>
            <th>Phòng</th>
            <th>Giờ</th>
            <th>Người Đặt</th>
            <th>Nội Dung Cuộc Họp</th>
            <th style="width:100px">Thao tác</th>
        </tr>
    </thead>
              <tbody id="adminBookingsBody">
                <!-- Data populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>

    <!-- Edit Booking Modal -->
    <div id="editBookingModal" class="modal hidden">
      <div class="modal-content" style="background: var(--dark-bg-alt);">
        <span class="modal-close" onclick="closeEditModal()">&times;</span>
        <h2>Sửa Lịch Đặt Phòng</h2>
        <form id="editBookingForm" class="booking-form" style="margin-top:20px;">
          <input type="hidden" id="editBookingId" />
          
          <div class="form-group">
            <label for="editRoomSelect">Chọn Phòng:</label>
            <select id="editRoomSelect" required>
              <option value="floor1">Phòng họp Lầu 1</option>
              <option value="floor4">Phòng họp Lầu 4</option>
            </select>
          </div>

          <div class="form-group">
            <label for="editBookingDate">Ngày Họp:</label>
            <input type="date" id="editBookingDate" required />
          </div>

          <div class="form-row" style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;">
              <label for="editStartTime">Giờ Bắt Đầu:</label>
              <select id="editStartTime" required></select>
            </div>
            <div class="form-group" style="flex:1;">
              <label for="editEndTime">Giờ Kết Thúc:</label>
              <select id="editEndTime" required></select>
            </div>
          </div>

          <div class="form-group">
            <label for="editPurpose">Nội dung cuộc họp <span class="required">*</span></label>
            <input type="text" id="editPurpose" required maxlength="1000" />
          </div>

          <div class="form-group">
            <label for="editOrganizerName">Người Đặt:</label>
            <input type="text" id="editOrganizerName" required />
          </div>

          <div class="form-group">
            <label for="editNotes">Ghi Chú:</label>
            <textarea id="editNotes"></textarea>
          </div>

          <button type="submit" class="submit-btn" style="background:#689a4b; color: white;">Lưu Thay Đổi</button>
        </form>
      </div>
    </div>

    <!-- Scripts -->
    <!-- Gọi Firebase để lấy dữ liệu lịch đặt phòng -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <!-- Gọi cấu hình Firebase và logic cho trang Admin -->
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
