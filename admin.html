<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRE NGHỆ | Trang Quản Trị Lịch Đặt Phòng Họp - Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="anh/Logo_TN2.png" />
    <!-- Tải các CSS cần thiết -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <div class="container">
      <header class="header admin-header">
        <img
          src="anh/Logo_TN1.png"
          alt="Tre Nghệ Logo"
          class="logo"
        />
        <h1> Trang Quản Trị Lịch Họp</h1>
        
      </header>

      <section id="adminView">
        <div class="admin-container">
          <div class="admin-topbar">
            <a href="index.html" id="backToMainLink" class="back-link">&larr; Quay lại trang chính</a>
          </div>

          <h2>Danh Sách Lịch Đặt Phòng</h2>

          <div class="table-responsive">
            <table class="admin-table">
              <thead>
        <tr>
            <th style="width:60px">STT</th>
            <th>Ngày</th>
            <th>Phòng</th>
            <th>Giờ</th>
            <th>Người Đặt</th>
            <th>Mục Đích</th>
            <th style="width:100px">Thao tác</th>
        </tr>
    </thead>
              <tbody id="adminBookingsBody">
                <!-- Data populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>

    <!-- Scripts -->
    <!-- Gọi Firebase để lấy dữ liệu lịch đặt phòng -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <!-- Gọi cấu hình Firebase và logic cho trang Admin -->
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
